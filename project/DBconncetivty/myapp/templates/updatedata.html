<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: lightblue;">
    <h1 style="color: white; text-align: center;">Welcome to Django</h1>
    <from method="post">
        {% csrf_token %}
        <input type="text" value="{{stid.name}}" placeholder="Name"><br><br>
        <input type="email" value="{{stid.email}}" placeholder="Email"><br><br>
        <input type="date" value="{{stid.dob | date:'y-m-d'}}" placeholder="Date of Birth"><br><br>
        <input type="number" name="mobile" value="{{stid.mobile}}" placeholder="Mobile"><br><br>
        <textarea name="address" placeholder="Address">value="{{stid.address}}"</textarea><br><br>
        <button type="submit">Submit</button>
    </from>
    <hr>
    <a href="/showdata/">showdata</a>


</body>

</html>
