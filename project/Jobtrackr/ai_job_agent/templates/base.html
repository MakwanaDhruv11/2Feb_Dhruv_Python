<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Job Agent{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Custom CSS Base -->
    <style>
        :root {
            --bg-color: #0b0f19;
            --bg-card: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --primary-accent: #06b6d4; /* Neon Cyan */
            --primary-accent-rgb: 6, 182, 212;
            --secondary-accent: #10b981; /* Emerald */
            --secondary-accent-rgb: 16, 185, 129;
            --danger-accent: #ef4444;
            --gradient-accent: linear-gradient(135deg, var(--primary-accent) 0%, var(--secondary-accent) 100%);
            --glass-blur: 16px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: #ffffff;
        }

        /* Glassmorphism Classes */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:hover {
            border-color: rgba(6, 182, 212, 0.3);
            box-shadow: 0 12px 40px 0 rgba(6, 182, 212, 0.1);
            transform: translateY(-2px);
        }

        /* Custom buttons */
        .btn-gradient {
            background: var(--gradient-accent);
            border: none;
            color: #ffffff;
            font-weight: 600;
            border-radius: 8px;
            padding: 10px 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.2);
        }

        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
            color: #ffffff;
            opacity: 0.95;
        }

        .btn-outline-custom {
            background: transparent;
            border: 1.5px solid var(--primary-accent);
            color: var(--primary-accent);
            font-weight: 600;
            border-radius: 8px;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }

        .btn-outline-custom:hover {
            background: var(--primary-accent);
            color: #0b0f19;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
            transform: translateY(-1px);
        }

        /* Page transitions and interactions */
        .fade-in-up {
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        main {
            flex-grow: 1;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar -->
    {% include 'partials/navbar.html' %}

    <!-- Main Content Area -->
    <main class="container py-5">
        {% if messages %}
            <div class="row">
                <div class="col-12">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show glass-card border-0" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    {% include 'partials/footer.html' %}

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Global JS and dynamic micro-interactions -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Apply scale effect to glass cards dynamically on hover
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach(card => {
                card.addEventListener('mouseenter', () => {
                    // Micro-interaction logic can be added here
                });
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
