{% extends 'base.html' %}

{% block title %}Password Reset Complete - AI Job Agent{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 fade-in-up">
    <div class="col-md-5">
        <div class="glass-card p-5 text-center">
            <div class="rounded-3 bg-gradient d-inline-flex p-3 mb-3" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                <i class="bi bi-shield-check text-white fs-3"></i>
            </div>
            <h2 class="fw-bold mb-3">Reset Successful</h2>
            <p class="text-secondary mb-4">
                Your password has been successfully set. You may now sign in using your new credentials.
            </p>
            <div class="mt-4">
                <a href="{% url 'accounts:login' %}" class="btn btn-gradient w-100 py-2.5">Sign In Now</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
