{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign In - AI Job Agent{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 fade-in-up">
    <div class="col-md-5">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <div class="rounded-3 bg-gradient d-inline-flex p-3 mb-3" style="background: var(--gradient-accent);">
                    <i class="bi bi-shield-lock text-white fs-3"></i>
                </div>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-secondary">Access your AI Career Intelligence Command Center</p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}
                
                <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
                    <div class="form-check">
                        <!-- Default remember me logic can be added if custom backend configured -->
                    </div>
                    <a href="{% url 'accounts:password_reset' %}" class="text-info text-decoration-none small hover-white">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-gradient w-100 py-2.5 mb-3">Sign In</button>
            </form>

            <div class="text-center mt-4">
                <p class="text-secondary small">Don't have an account? 
                    <a href="{% url 'accounts:signup' %}" class="text-info text-decoration-none hover-white fw-bold">Sign Up Free</a>
                </p>
            </div>
        </div>
    </div>
</div>

<style>
    /* Override crispy forms labels & inputs for dark theme consistency */
    .form-control, .form-select {
        background-color: rgba(17, 24, 39, 0.6) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #ffffff !important;
        border-radius: 8px !important;
        padding: 10px 14px !important;
    }
    .form-control:focus, .form-select:focus {
        border-color: var(--primary-accent) !important;
        box-shadow: 0 0 8px rgba(6, 182, 212, 0.2) !important;
        background-color: rgba(17, 24, 39, 0.8) !important;
    }
    .form-label, .form-check-label {
        color: var(--text-secondary) !important;
        font-weight: 500;
        margin-bottom: 6px;
    }
    .invalid-feedback {
        color: var(--danger-accent) !important;
    }
    .helptext {
        color: var(--text-secondary) !important;
        font-size: 0.8rem;
        display: block;
        margin-top: 4px;
    }
</style>
{% endblock %}
