{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Reset Password - AI Job Agent{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5 fade-in-up">
    <div class="col-md-5">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <div class="rounded-3 bg-gradient d-inline-flex p-3 mb-3" style="background: var(--gradient-accent);">
                    <i class="bi bi-key text-white fs-3"></i>
                </div>
                <h2 class="fw-bold">Password Reset</h2>
                <p class="text-secondary">Enter your email and we'll send you instructions to reset your password.</p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}

                <button type="submit" class="btn btn-gradient w-100 py-2.5 mt-3 mb-3">Send Reset Link</button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'accounts:login' %}" class="text-info text-decoration-none hover-white"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
            </div>
        </div>
    </div>
</div>

<style>
    /* Override crispy forms labels & inputs for dark theme consistency */
    .form-control {
        background-color: rgba(17, 24, 39, 0.6) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: #ffffff !important;
        border-radius: 8px !important;
        padding: 10px 14px !important;
    }
    .form-control:focus {
        border-color: var(--primary-accent) !important;
        box-shadow: 0 0 8px rgba(6, 182, 212, 0.2) !important;
        background-color: rgba(17, 24, 39, 0.8) !important;
    }
    .form-label {
        color: var(--text-secondary) !important;
        font-weight: 500;
        margin-bottom: 6px;
    }
    .invalid-feedback {
        color: var(--danger-accent) !important;
    }
</style>
{% endblock %}
