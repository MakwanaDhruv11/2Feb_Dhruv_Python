{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio | Futuristic Cyberpunk{% endblock %}</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            black: '#050505',
                            dark: '#0a0a0a',
                            neon: '#00f2ff',
                            purple: '#bc00ff',
                            gold: '#ffd700',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        orbitron: ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc00ff;
        }
        
        body {
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
            cursor: none;
        }
        
        /* Custom Cursor */
        .cursor-follower {
            position: fixed;
            width: 20px;
            height: 20px;
            background: var(--neon-cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        
        /* Neon Glow */
        .neon-text {
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
        }
        
        .neon-border {
            box-shadow: 0 0 15px var(--neon-cyan);
            border-color: var(--neon-cyan);
        }
        
        /* Scroll Progress */
        #scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(to right, var(--neon-cyan), var(--neon-purple));
            z-index: 10000;
            width: 0%;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a1a1a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-cyan);
        }
    </style>
</head>
<body class="font-sans">
    <!-- Custom Cursor -->
    <div class="cursor-follower" id="cursor"></div>
    
    <!-- Scroll Progress -->
    <div id="scroll-progress"></div>
    
    <!-- Loader -->
    <div id="loader" class="fixed inset-0 z-[10001] bg-cyber-black flex items-center justify-center">
        <div class="text-center">
            <div class="w-24 h-24 border-4 border-cyber-neon border-t-transparent rounded-full animate-spin mb-4 shadow-[0_0_20px_#00f2ff]"></div>
            <p class="font-orbitron text-cyber-neon tracking-widest uppercase">Initializing Systems...</p>
        </div>
    </div>

    {% include 'portfolio/components/navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'portfolio/components/footer.html' %}

    <!-- JS Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
    
    <script>
        AOS.init({
            duration: 1000,
            once: false,
            mirror: true
        });
    </script>
</body>
</html>
